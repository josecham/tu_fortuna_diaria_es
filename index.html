<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhaleRadar Pro - Solana Flow</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono&display=swap');
        body { background-color: #020617; font-family: 'Space Grotesk', sans-serif; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .whale-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid #1e293b; }
        .live-dot { animation: pulse 2s infinite; background-color: #14f195; } /* Color Solana Green */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .mega-whale-alert {
            animation: alert-flash 0.8s infinite alternate;
            border: 2px solid #9945FF; /* Color Solana Purple */
            box-shadow: 0 0 40px rgba(153, 69, 255, 0.4);
        }
        @keyframes alert-flash {
            from { background-color: rgba(153, 69, 255, 0.1); transform: scale(1); }
            to { background-color: rgba(153, 69, 255, 0.3); transform: scale(1.02); }
        }

        .gauge-container { position: relative; width: 180px; height: 90px; margin: 0 auto; overflow: hidden; }
        .gauge-bg { width: 180px; height: 180px; border-radius: 50%; border: 15px solid #1e293b; border-bottom-color: transparent; border-left-color: transparent; transform: rotate(-135deg); }
        .gauge-fill { 
            position: absolute; top: 0; left: 0; width: 180px; height: 180px; border-radius: 50%; 
            border: 15px solid transparent; border-bottom-color: currentColor; border-left-color: currentColor; 
            transform: rotate(var(--angle)); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .gauge-needle {
            position: absolute; bottom: 0; left: 50%; width: 2px; height: 70px; 
            background: white; transform-origin: bottom; 
            transform: translateX(-50%) rotate(var(--needle-angle)); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-item { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN ---
        // Debes obtener una API KEY en Helius.dev (Gratis)
        const HELIUS_API_KEY = "TU_API_KEY_AQUI"; 
        const SOLANA_WSS = `wss://atlas-mainnet.helius-rpc.com?api-key=${HELIUS_API_KEY}`;
        const RAYDIUM_PROGRAM_ID = "675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8";

        const WhaleRadarApp = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pass, setPass] = useState("");
            const [events, setEvents] = useState([]);
            const [sentimentScore, setSentimentScore] = useState(50);
            const [megaWhale, setMegaWhale] = useState(null);
            const [megaWhaleCount, setMegaWhaleCount] = useState(0);

            useEffect(() => {
                if (!isAuthenticated || HELIUS_API_KEY === "TU_API_KEY_AQUI") return;

                const socket = new WebSocket(SOLANA_WSS);

                socket.onopen = () => {
                    // Nos suscribimos a los logs del programa de Raydium (Swaps)
                    const subRequest = {
                        jsonrpc: "2.0",
                        id: 1,
                        method: "logsSubscribe",
                        params: [
                            { mentions: [RAYDIUM_PROGRAM_ID] },
                            { commitment: "processed" }
                        ]
                    };
                    socket.send(JSON.stringify(subRequest));
                };

                socket.onmessage = (msg) => {
                    const data = JSON.parse(msg.data);
                    
                    if (data.method === "logsNotification") {
                        // Simulamos detección de volumen en Solana (0.5 a 500 SOL para el demo)
                        // En producción aquí procesaríamos el log real para extraer el monto exacto
                        const randomSol = (Math.random() * 80).toFixed(2);
                        const isBull = Math.random() > 0.45;

                        if (parseFloat(randomSol) > 10) {
                            const newEvent = {
                                id: Math.random().toString(36),
                                txid: data.params.result.signature,
                                amount: parseFloat(randomSol),
                                amountFormatted: randomSol,
                                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                                action: isBull ? { label: 'SWAP BUY', type: 'BULL' } : { label: 'SWAP SELL', type: 'BEAR' }
                            };

                            // Mega Whale Alert (> 50 SOL)
                            if (parseFloat(randomSol) > 50) {
                                setMegaWhale({ amount: randomSol, type: isBull ? 'COMPRA' : 'VENTA' });
                                setMegaWhaleCount(prev => prev + 1);
                                setTimeout(() => setMegaWhale(null), 5000);
                            }

                            setEvents(prev => [newEvent, ...prev].slice(0, 8));
                            setSentimentScore(prev => {
                                const adj = isBull ? 1.2 : -1.2;
                                return Math.round(Math.min(Math.max(prev + adj, 10), 90));
                            });
                        }
                    }
                };

                return () => socket.close();
            }, [isAuthenticated]);

            const stats = useMemo(() => {
                const buy = events.filter(e => e.action.type === 'BULL').reduce((acc, e) => acc + e.amount, 0);
                const sell = events.filter(e => e.action.type === 'BEAR').reduce((acc, e) => acc + e.amount, 0);
                const total = buy + sell;
                return { 
                    buyPer: total > 0 ? (buy / total) * 100 : 50,
                    sellPer: total > 0 ? (sell / total) * 100 : 50,
                    vol: total
                };
            }, [events]);

            if (!isAuthenticated) {
                return (
                    <div className="fixed inset-0 bg-black flex items-center justify-center p-6">
                        <div className="whale-card p-10 rounded-[3rem] w-full max-w-xs text-center border-purple-500/30">
                            <i className="ph-fill ph-target text-5xl text-purple-500 mb-6 block mx-auto"></i>
                            <h2 className="text-xl font-black uppercase italic mb-8 tracking-tighter">Solana Radar Access</h2>
                            <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} placeholder="CONTRASEÑA" className="w-full bg-black border border-white/10 rounded-2xl py-4 text-center mono text-purple-400 mb-4 outline-none" />
                            <button onClick={() => pass.toUpperCase() === "WHALE2026" && setIsAuthenticated(true)} className="w-full bg-purple-600 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest text-white shadow-[0_0_20px_rgba(153,69,255,0.4)]">Iniciar Escaneo</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#020617] pb-32">
                    {megaWhale && (
                        <div className="fixed top-20 left-4 right-4 z-50 mega-whale-alert p-6 rounded-3xl text-center backdrop-blur-xl">
                            <i className="ph-fill ph-crown text-4xl text-yellow-400 mb-2 animate-bounce"></i>
                            <h2 className="text-2xl font-black tracking-tighter text-white uppercase italic">SOLANA WHALE DETECTED</h2>
                            <p className="mono text-purple-300 text-lg font-bold">{megaWhale.amount} SOL en {megaWhale.type}</p>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-lg z-20 border-b border-white/5">
                        <h1 className="text-2xl font-black italic uppercase tracking-tighter text-white">Sol<span className="text-purple-500">Radar</span></h1>
                        <div className="flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full live-dot"></span>
                            <span className="text-[9px] mono font-bold text-gray-400 uppercase tracking-widest tracking-tighter">Solana Mainnet</span>
                        </div>
                    </header>

                    <div className="p-6">
                        {/* GAUGE */}
                        <div className="whale-card p-8 rounded-[3rem] mb-6 text-center border-purple-500/10">
                            <h3 className="text-[10px] mono text-gray-500 font-black uppercase tracking-[0.4em] mb-6 italic">SOL Sentiment</h3>
                            <div className="gauge-container mb-4">
                                <div className="gauge-bg"></div>
                                <div className="gauge-fill text-purple-500" style={{ '--angle': `${-135 + (sentimentScore * 1.8)}deg` }}></div>
                                <div className="gauge-needle" style={{ '--needle-angle': `${-90 + (sentimentScore * 1.8)}deg` }}></div>
                            </div>
                            <div className="text-2xl font-black tracking-tighter text-white uppercase">
                                {sentimentScore > 50 ? 'Bullish' : 'Bearish'} Flow
                            </div>
                        </div>

                        {/* POWER BAR */}
                        <div className="whale-card p-6 rounded-[2.5rem] mb-6 border-white/5">
                            <div className="flex justify-between text-[10px] mono mb-3 uppercase font-black italic">
                                <span className="text-[#14f195]">Bulls {stats.buyPer.toFixed(0)}%</span>
                                <span className="text-[#ff4b4b]">Bears {stats.sellPer.toFixed(0)}%</span>
                            </div>
                            <div className="w-full h-3 bg-gray-950 rounded-full overflow-hidden flex">
                                <div className="h-full bg-[#14f195] transition-all duration-700" style={{ width: `${stats.buyPer}%` }}></div>
                                <div className="h-full bg-[#ff4b4b] transition-all duration-700" style={{ width: `${stats.sellPer}%` }}></div>
                            </div>
                        </div>

                        {/* FEED */}
                        <div className="space-y-4">
                            <h3 className="text-[10px] mono text-gray-600 font-black uppercase tracking-[0.4em] text-center italic mb-4">Live Raydium Swaps</h3>
                            {events.length === 0 && (
                                <div className="text-center py-10 text-gray-600 animate-pulse font-bold text-xs uppercase">Buscando actividad en la red...</div>
                            )}
                            {events.map(ev => (
                                <div key={ev.id} className="whale-card p-6 rounded-[2.5rem] border-white/5 animate-item">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <span className="text-[8px] mono text-purple-500 font-bold uppercase">Solana Transaction</span>
                                            <div className="text-2xl font-black text-white">{ev.amountFormatted} SOL</div>
                                        </div>
                                        <div className={`px-4 py-2 rounded-full text-[10px] font-black ${ev.action.type === 'BULL' ? 'bg-[#14f195]/10 text-[#14f195]' : 'bg-red-500/10 text-red-400'}`}>
                                            {ev.action.label}
                                        </div>
                                    </div>
                                    <div className="mt-4 flex justify-between items-center">
                                        <span className="text-[9px] mono text-gray-600 font-bold">{ev.txid.substring(0,20)}...</span>
                                        <a href={`https://solscan.io/tx/${ev.txid}`} target="_blank" className="text-purple-500 text-[10px] font-bold underline">Explorer</a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black/95 backdrop-blur-xl border-t border-white/5 p-8 flex justify-around items-center z-50">
                        <i className="ph-fill ph-navigation-arrow text-3xl text-purple-500"></i>
                        <i className="ph ph-chart-line-up text-2xl text-gray-600"></i>
                        <i className="ph ph-user text-2xl text-gray-600"></i>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WhaleRadarApp />);
    </script>
</body>
</html>
