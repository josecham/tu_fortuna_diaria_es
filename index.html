<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truco Argentino Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #064e3b; overflow: hidden; touch-action: manipulation; }
        .felt-table { background: radial-gradient(circle, #065f46 0%, #064e3b 100%); }
        .card-shape { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .card-shape:active { transform: translateY(-20px) rotate(5deg); }
        .points-box { font-family: 'Roboto Condensed', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- VALORES Y CARTAS ---
        const PALOS = ['Espada', 'Basto', 'Oro', 'Copa'];
        const NUMEROS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
        
        const getValorTruco = (n, p) => {
            if (n === 1 && p === 'Espada') return 14;
            if (n === 1 && p === 'Basto') return 13;
            if (n === 7 && p === 'Espada') return 12;
            if (n === 7 && p === 'Oro') return 11;
            if (n === 3) return 10;
            if (n === 2) return 9;
            if (n === 1) return 8;
            if (n === 12) return 7;
            if (n === 11) return 6;
            if (n === 10) return 5;
            if (n === 7) return 4;
            if (n === 6) return 3;
            if (n === 5) return 2;
            if (n === 4) return 1;
            return 0;
        };

        const crearMazo = () => {
            const mazo = [];
            PALOS.forEach(p => {
                NUMEROS.forEach(n => {
                    mazo.push({ n, p, v: getValorTruco(n, p), id: `${n}-${p}` });
                });
            });
            return mazo.sort(() => Math.random() - 0.5);
        };

        const calcularEnvido = (cartas) => {
            let maxPuntos = 0;
            const porPalo = {};
            cartas.forEach(c => {
                if (!porPalo[c.p]) porPalo[c.p] = [];
                porPalo[c.p].push(c.n < 10 ? c.n : 0);
            });

            Object.values(porPalo).forEach(nums => {
                nums.sort((a, b) => b - a);
                if (nums.length >= 2) {
                    maxPuntos = Math.max(maxPuntos, 20 + nums[0] + nums[1]);
                } else {
                    maxPuntos = Math.max(maxPuntos, nums[0]);
                }
            });
            return maxPuntos;
        };

        // --- COMPONENTES ---
        const Carta = ({ n, p, onClick, disabled, size="small" }) => (
            <div 
                onClick={!disabled ? onClick : null}
                className={`card-shape bg-white rounded-lg border-2 border-slate-300 flex flex-col justify-between p-2 shadow-xl ${size === 'small' ? 'w-20 h-32' : 'w-24 h-36'} ${disabled ? 'opacity-50 grayscale' : ''}`}
            >
                <div className="flex flex-col leading-none">
                    <span className="text-xl font-bold text-slate-800">{n}</span>
                    <span className="text-[10px] uppercase text-slate-400">{p}</span>
                </div>
                <div className="text-center text-4xl">
                    {p === 'Espada' && '⚔️'}
                    {p === 'Basto' && '🪵'}
                    {p === 'Oro' && '🟡'}
                    {p === 'Copa' && '🏆'}
                </div>
                <div className="text-right leading-none rotate-180">
                    <span className="text-xl font-bold text-slate-800">{n}</span>
                </div>
            </div>
        );

        const App = () => {
            const [puntosYo, setPuntosYo] = useState(0);
            const [puntosIA, setPuntosIA] = useState(0);
            const [mano, setMano] = useState([]);
            const [manoIA, setManoIA] = useState([]);
            const [mesaYo, setMesaYo] = useState([]);
            const [mesaIA, setMesaIA] = useState([]);
            const [mensaje, setMensaje] = useState("¡Tu turno!");

            const nuevaMano = () => {
                const m = crearMazo();
                setMano(m.slice(0, 3));
                setManoIA(m.slice(3, 6));
                setMesaYo([]);
                setMesaIA([]);
                setMensaje("¡Tu turno!");
            };

            useEffect(() => { nuevaMano(); }, []);

            const puntosEnvido = useMemo(() => calcularEnvido(mano), [mano]);

            const jugarCarta = (carta) => {
                if (mesaYo.length >= 3) return;
                
                // Jugador juega
                setMesaYo([...mesaYo, carta]);
                setMano(mano.filter(c => c.id !== carta.id));

                // IA juega (IA muy básica: juega su carta más alta)
                setTimeout(() => {
                    const cartaIA = manoIA[0];
                    setMesaIA([...mesaIA, cartaIA]);
                    setManoIA(manoIA.slice(1));
                    
                    if (mesaYo.length === 2) {
                        setMensaje("Fin de ronda. Repartiendo...");
                        setTimeout(nuevaMano, 2000);
                    }
                }, 600);
            };

            return (
                <div className="h-screen w-screen felt-table flex flex-col text-white">
                    {/* Header */}
                    <div className="p-4 flex justify-between items-center bg-black/20">
                        <div className="points-box text-center">
                            <p className="text-[10px] uppercase">Rival</p>
                            <p className="text-2xl font-black text-red-500">{puntosIA}</p>
                        </div>
                        <h1 className="font-serif italic text-2xl tracking-widest text-yellow-500">TRUCO</h1>
                        <div className="points-box text-center">
                            <p className="text-[10px] uppercase">Yo</p>
                            <p className="text-2xl font-black text-green-500">{puntosYo}</p>
                        </div>
                    </div>

                    {/* Mesa */}
                    <div className="flex-1 relative flex flex-col items-center justify-center gap-4">
                        <div className="flex gap-2">
                            {mesaIA.map(c => <Carta key={c.id} {...c} disabled />)}
                        </div>
                        <div className="h-px w-32 bg-white/10 my-4"></div>
                        <div className="flex gap-2">
                            {mesaYo.map(c => <Carta key={c.id} {...c} size="large" />)}
                        </div>
                        
                        <div className="absolute top-4 left-4 bg-black/30 p-2 rounded-lg border border-white/10">
                            <p className="text-[10px] text-gray-300">Envido: <span className="text-white font-bold">{puntosEnvido}</span></p>
                        </div>

                        <div className="absolute bottom-4 bg-yellow-500/90 text-black px-4 py-1 rounded-full font-bold text-sm">
                            {mensaje}
                        </div>
                    </div>

                    {/* Controles/Acciones */}
                    <div className="p-4 flex gap-2 justify-center mb-4">
                        <button onClick={() => alert('Envido cantado: ' + puntosEnvido)} className="bg-blue-600 px-3 py-2 rounded-xl font-bold text-xs uppercase shadow-lg active:scale-95">Envido</button>
                        <button onClick={() => alert('¡Truco!')} className="bg-red-600 px-3 py-2 rounded-xl font-bold text-xs uppercase shadow-lg active:scale-95">Truco</button>
                        <button onClick={nuevaMano} className="bg-slate-700 px-3 py-2 rounded-xl font-bold text-xs uppercase shadow-lg">Mazo</button>
                    </div>

                    {/* Mis Cartas */}
                    <div className="p-6 pb-12 flex justify-center gap-3 bg-black/40 rounded-t-[3rem]">
                        {mano.map(c => (
                            <Carta key={c.id} {...c} onClick={() => jugarCarta(c)} size="large" />
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
