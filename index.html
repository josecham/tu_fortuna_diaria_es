<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truco Argentino Pro + Sonidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #064e3b; overflow: hidden; touch-action: manipulation; font-family: sans-serif; }
        .felt-table { background: radial-gradient(circle, #065f46 0%, #022c22 100%); }
        
        /* Estilo de los palitos de puntos */
        .fosforo { width: 4px; height: 20px; background-color: #fde047; border-radius: 2px; display: inline-block; margin: 1px; box-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .fosforo-H { width: 20px; height: 4px; }

        .card-animate { animation: deal 0.5s ease-out forwards; }
        @keyframes deal { from { transform: translateY(300px) rotate(20deg); opacity: 0; } to { transform: translateY(0) rotate(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Audios (usando librerías públicas de sonidos cortos)
        const playSfx = (type) => {
            const sounds = {
                truco: 'https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3',
                envido: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3',
                card: 'https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'
            };
            new Audio(sounds[type]).play().catch(() => {});
        };

        const PALOS = ['Espada', 'Basto', 'Oro', 'Copa'];
        const NUMEROS = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
        const getValor = (n, p) => {
            if (n === 1 && p === 'Espada') return 14;
            if (n === 1 && p === 'Basto') return 13;
            if (n === 7 && p === 'Espada') return 12;
            if (n === 7 && p === 'Oro') return 11;
            if (n === 3) return 10; if (n === 2) return 9; if (n === 1) return 8;
            if (n === 12) return 7; if (n === 11) return 6; if (n === 10) return 5;
            if (n === 7) return 4; if (n === 6) return 3; if (n === 5) return 2;
            return 1;
        };

        // Componente para dibujar los palitos (fósforos)
        const MarcadorPuntos = ({ puntos }) => {
            const gruposDe5 = Math.floor(puntos / 5);
            const resto = puntos % 5;
            
            return (
                <div className="flex flex-wrap w-16 gap-2 justify-center bg-black/20 p-2 rounded-lg">
                    {[...Array(gruposDe5)].map((_, i) => (
                        <div key={i} className="relative w-6 h-6 border-2 border-yellow-500/30">
                            <div className="absolute top-0 left-0 w-full h-1 bg-yellow-400"></div>
                            <div className="absolute top-0 left-0 w-1 h-full bg-yellow-400"></div>
                            <div className="absolute bottom-0 left-0 w-full h-1 bg-yellow-400"></div>
                            <div className="absolute top-0 right-0 w-1 h-full bg-yellow-400"></div>
                            <div className="absolute top-1/2 left-0 w-full h-1 bg-yellow-400 -rotate-45"></div>
                        </div>
                    ))}
                    {resto > 0 && (
                        <div className="grid grid-cols-2 gap-1">
                            {[...Array(resto)].map((_, i) => <div key={i} className="fosforo"></div>)}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [puntosYo, setPuntosYo] = useState(0);
            const [puntosIA, setPuntosIA] = useState(0);
            const [mano, setMano] = useState([]);
            const [mesaYo, setMesaYo] = useState([]);
            const [mesaIA, setMesaIA] = useState([]);
            const [mensaje, setMensaje] = useState("¡Tu turno, miente!");

            const repartir = () => {
                playSfx('card');
                const mazo = [];
                PALOS.forEach(p => NUMEROS.forEach(n => mazo.push({ n, p, v: getValor(n, p), id: Math.random() })));
                const barajado = mazo.sort(() => Math.random() - 0.5);
                setMano(barajado.slice(0, 3));
                setMesaYo([]);
                setMesaIA([]);
                setMensaje("Cartas nuevas...");
            };

            useEffect(() => { repartir(); }, []);

            const cantar = (tipo) => {
                playSfx(tipo === 'truco' ? 'truco' : 'envido');
                setMensaje(tipo.toUpperCase() + "!!!");
            };

            const tirarCarta = (c) => {
                playSfx('card');
                setMesaYo([...mesaYo, c]);
                setMano(mano.filter(card => card.id !== c.id));
                
                // IA responde
                setTimeout(() => {
                    const cartaFicticiaIA = { n: '?', p: '?', v: 0, id: Math.random() };
                    setMesaIA([...mesaIA, cartaFicticiaIA]);
                    if (mesaYo.length === 2) {
                        setPuntosYo(prev => prev + 1); // Suma un punto por ganar la mano
                        setTimeout(repartir, 1500);
                    }
                }, 500);
            };

            return (
                <div className="h-screen w-screen felt-table flex flex-col text-white select-none">
                    {/* Marcador Profesional */}
                    <div className="flex justify-between p-4 bg-black/40 border-b border-white/10">
                        <div className="flex flex-col items-center">
                            <span className="text-[10px] font-bold text-red-400">RIVAL</span>
                            <MarcadorPuntos puntos={puntosIA} />
                        </div>
                        <div className="text-center">
                            <h2 className="text-yellow-500 font-black italic tracking-tighter text-xl">TRUCO</h2>
                            <span className="text-[9px] text-gray-400 uppercase">Mesa de Rosario</span>
                        </div>
                        <div className="flex flex-col items-center">
                            <span className="text-[10px] font-bold text-green-400">NOSOTROS</span>
                            <MarcadorPuntos puntos={puntosYo} />
                        </div>
                    </div>

                    {/* Área de juego */}
                    <div className="flex-1 relative flex flex-col justify-around py-10 items-center">
                        <div className="flex gap-2">
                            {mesaIA.map((c, i) => (
                                <div key={i} className="w-16 h-24 bg-slate-800 rounded-lg border-2 border-white/20 flex items-center justify-center text-2xl">🎴</div>
                            ))}
                        </div>

                        <div className="bg-black/20 px-6 py-2 rounded-full border border-white/5 text-sm font-bold animate-pulse text-yellow-200">
                            {mensaje}
                        </div>

                        <div className="flex gap-2">
                            {mesaYo.map((c, i) => (
                                <div key={i} className="w-20 h-32 bg-white rounded-lg flex flex-col justify-between p-2 text-black shadow-2xl border-2 border-yellow-500">
                                    <span className="font-bold text-lg">{c.n}</span>
                                    <span className="text-center text-3xl">{c.p === 'Espada' ? '⚔️' : c.p === 'Basto' ? '🪵' : c.p === 'Oro' ? '🟡' : '🏆'}</span>
                                    <span className="font-bold text-lg self-end rotate-180">{c.n}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Botonera Acciones */}
                    <div className="flex justify-center gap-4 mb-4">
                        <button onClick={() => cantar('envido')} className="bg-gradient-to-b from-blue-500 to-blue-700 px-6 py-3 rounded-2xl font-black text-xs shadow-lg active:scale-90 transition-transform">ENVIDO</button>
                        <button onClick={() => cantar('truco')} className="bg-gradient-to-b from-red-500 to-red-700 px-6 py-3 rounded-2xl font-black text-xs shadow-lg active:scale-90 transition-transform">TRUCO</button>
                        <button onClick={repartir} className="bg-gray-700 px-4 py-3 rounded-2xl font-black text-[10px] shadow-lg">MAZO</button>
                    </div>

                    {/* Mis Cartas */}
                    <div className="bg-black/60 p-6 rounded-t-[3rem] flex justify-center gap-4 border-t border-white/10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                        {mano.map((c) => (
                            <div 
                                key={c.id} 
                                onClick={() => tirarCarta(c)}
                                className="w-24 h-36 bg-white rounded-xl flex flex-col justify-between p-3 text-black shadow-xl card-animate border-2 border-slate-200 hover:-translate-y-4 transition-transform cursor-pointer"
                            >
                                <span className="font-bold text-xl">{c.n}</span>
                                <span className="text-center text-4xl">{c.p === 'Espada' ? '⚔️' : c.p === 'Basto' ? '🪵' : c.p === 'Oro' ? '🟡' : '🏆'}</span>
                                <div className="text-right flex flex-col">
                                    <span className="text-[8px] text-gray-400 uppercase">{c.p}</span>
                                    <span className="font-bold text-xl rotate-180">{c.n}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
