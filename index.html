<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suerte Diaria - Fortuna Grande</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        instablack: '#000000',
                        instagreydark: '#121212',
                        instagreylight: '#262626',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            background-color: black;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        #root { width: 100%; height: 100%; max-width: 500px; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATOS: Lista de mensajes de fortuna aleatorios ---
        const listaFortunas = [
            "Una sonrisa tuya puede cambiar el día de alguien más.",
            "Hoy es un día perfecto para empezar ese proyecto que has estado posponiendo.",
            "Alguien cercano te dará una grata sorpresa esta semana.",
            "Confía en tu intuición; te guiará por el camino correcto hoy.",
            "Un viaje inesperado te traerá nuevas y valiosas perspectivas.",
            "Tu arduo trabajo pronto dará sus frutos. Mantén la perseverancia.",
            "No temas a los cambios; a menudo traen consigo mejores oportunidades.",
            "La paciencia es una virtud que te ahorrará muchos dolores de cabeza.",
            "Una nueva amistad te abrirá puertas que no sabías que existían.",
            "Aprende del pasado, pero vive el presente con intensidad."
        ];

        // Función para obtener la fecha actual en formato dinámico
        const obtenerFechaFormateada = () => {
            const hoy = new Date();
            const y = hoy.getFullYear();
            const m = String(hoy.getMonth() + 1).padStart(2, '0');
            const d = String(hoy.getDate()).padStart(2, '0');
            const diasSemana = ["(Dom)", "(Lun)", "(Mar)", "(Mié)", "(Jue)", "(Vie)", "(Sáb)"];
            const diaSemana = diasSemana[hoy.getDay()];
            return `${y}.${m}.${d} ${diaSemana}`;
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [fortunaHoy, setFortunaHoy] = useState(listaFortunas[0]);
            const [fechaFormateada, setFechaFormateada] = useState("");

            // Función para cambiar la fortuna aleatoriamente
            const obtenerNuevaFortuna = () => {
                let nueva;
                do {
                    const indice = Math.floor(Math.random() * listaFortunas.length);
                    nueva = listaFortunas[indice];
                } while (nueva === fortunaHoy); // Evitar que salga la misma seguida si hay más de una

                setFortunaHoy(nueva);
            };

            // Establecer fecha y fortuna al cargar
            useEffect(() => {
                setFechaFormateada(obtenerFechaFormateada());
                obtenerNuevaFortuna();
            }, []);

            return (
                <div className="h-full w-full flex flex-col bg-instablack font-sans relative">
                    
                    {/* 1. Header (Reducido) */}
                    <div className="flex items-center gap-2 p-3 border-b border-instagreylight">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        <span className="font-bold text-base">Suerte Diaria</span>
                    </div>

                    {/* 2. Área Central: La Imagen Grande */}
                    <div className="flex-1 p-2 flex flex-col items-center justify-center">
                        {/* Perfil (Pequeño) */}
                        <div className="w-full flex items-center gap-2 mb-2 px-2">
                            <div className="w-7 h-7 rounded-full bg-instagreylight flex items-center justify-center text-xs">🔮</div>
                            <div>
                                <p className="font-semibold text-xs">tu_fortuna_diaria_es</p>
                                <p className="text-[10px] text-gray-400">Ver horóscopo</p>
                            </div>
                        </div>

                        {/* TARJETA DE LA FORTUNA: AGRANDADA */}
                        <div className="aspect-[4/5] w-full bg-[#f8f6e9] rounded-md p-6 flex flex-col items-center justify-between text-instablack shadow-inner relative overflow-hidden">
                            {/* Decoración esquinas coreanas */}
                            <div className="w-full flex justify-between px-2 text-3xl opacity-30">
                                <span>©</span><span className="rotate-90">©</span>
                            </div>
                            
                            <div className="flex-1 flex flex-col items-center justify-center gap-3 py-4 text-center">
                                <h1 className="text-5xl font-extrabold tracking-tighter leading-none mb-2">HOY<br/>SUERTE</h1>
                                
                                <div className="border border-instablack px-4 py-0.5 text-xs font-bold rounded-sm mb-4">
                                    {fechaFormateada}
                                </div>
                                
                                <p className="text-lg font-medium leading-snug px-2">
                                    "{fortunaHoy}"
                                </p>
                            </div>

                            <div className="w-full flex justify-between px-2 text-3xl opacity-30">
                                <span className="-rotate-90">©</span><span className="rotate-180">©</span>
                            </div>
                        </div>
                    </div>

                    {/* 3. Acciones Inferiores (Compactas) */}
                    <div className="p-3 pt-0 border-b border-instagreylight">
                        <button 
                            onClick={obtenerNuevaFortuna}
                            className="w-full bg-white text-black font-semibold py-2 rounded-md text-sm hover:bg-gray-200 active:scale-95 transition-all mb-3"
                        >
                            Obtener Nueva Fortuna
                        </button>

                        <div className="flex items-center justify-between text-gray-400 text-xs px-1">
                            <span>77 likes</span>
                            <span className="font-mono">{fechaFormateada}</span>
                        </div>
                    </div>

                    {/* Barra de navegación inferior simulada (Reducida) */}
                    <div className="bg-instablack border-t border-instagreylight px-8 py-3 flex justify-between items-center text-gray-500">
                         <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12.97 2.59a1.5 1.5 0 0 0-1.94 0l-7.5 6.22A1.5 1.5 0 0 0 3 9.93v9.57a1.5 1.5 0 0 0 1.5 1.5h15a1.5 1.5 0 0 0 1.5-1.5V9.93a1.5 1.5 0 0 0-.53-1.12l-7.5-6.22ZM19.5 19.5h-15V9.93L12 3.73l7.5 6.2ZM12 16.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"></path></svg>
                         <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                         <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                         <div className="w-6 h-6 rounded-full bg-instagreylight flex items-center justify-center text-xs border border-white text-white">U</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
