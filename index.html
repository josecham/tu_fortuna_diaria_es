<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suerte Diaria - Gold Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        instablack: '#000000',
                        instagreydark: '#121212',
                        instagreylight: '#262626',
                        gold: '#D4AF37',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            background-color: black;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            color: white;
            font-family: sans-serif;
        }
        #root { width: 100%; min-height: 100vh; max-width: 500px; }
        .lucky-card { background-color: #f8f6e9; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .gold-card {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            background-size: 200% 200%;
            animation: goldFlow 5s ease infinite;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.8);
            transform: scale(1.02);
        }
        @keyframes goldFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hidden-view { display: none !important; }
    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen w-full flex flex-col bg-instablack text-white font-sans">
            
            <div class="sticky top-0 z-50 bg-instablack flex items-center gap-4 p-4 border-b border-instagreylight">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span class="font-bold text-lg">Suerte Diaria</span>
            </div>

            <div class="flex-1 flex flex-col items-center p-4 gap-6 pb-24">
                <a href="https://www.facebook.com/groups/942830941793431" target="_blank" class="w-full flex items-center gap-3 px-2">
                    <div id="badge-icon" class="w-9 h-9 rounded-full flex items-center justify-center text-sm border bg-instagreylight border-white/10">🔮</div>                                                                                                                
                    <div class="flex flex-col text-left">
                        <span id="badge-title" class="font-bold text-sm text-white">reflexiones para el alma</span>
                        <span class="text-[10px] text-gray-500 uppercase tracking-tighter italic">Comunidad de Facebook</span>
                    </div>
                </a>

                <div id="card-element" class="lucky-card w-full aspect-[3/4] rounded-2xl p-8 flex flex-col items-center justify-between text-black relative shadow-2xl overflow-hidden">
                    
                    <div class="absolute top-4 left-4 w-20 h-20 opacity-85 pointer-events-none select-none z-20">
                        <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                            <path d="M45 50 C25 40 10 20 25 10 C40 0 50 25 55 35 C60 25 70 0 85 10 C100 20 85 40 65 50 C55 55 50 65 45 50 Z" fill="#f4b251" stroke="#4a2c00" stroke-width="2.5" stroke-linejoin="round"/>
                            <path d="M48 42 C40 32 35 20 28 15" fill="none" stroke="#4a2c00" stroke-width="1.5"/>
                            <path d="M62 42 C70 32 75 20 82 15" fill="none" stroke="#4a2c00" stroke-width="1.5"/>
                            <path d="M48 45 L5 48 L8 58 L52 53 Z" fill="#ffffff" stroke="#4a2c00" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M12 51 L45 49" fill="none" stroke="#9c9c9c" stroke-width="1" stroke-dasharray="2,2"/>
                        </svg>
                    </div>

                    <div class="absolute bottom-6 right-4 w-16 h-16 opacity-85 pointer-events-none select-none z-20">
                        <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                            <path d="M20 70 C5 50 15 20 45 30 C75 40 85 15 90 40 C95 65 65 85 50 80 C35 85 25 80 20 70 Z" fill="#e29b32" stroke="#4a2c00" stroke-width="2.5" stroke-linejoin="round"/>
                            <path d="M45 30 C48 45 42 65 50 80" fill="none" stroke="#4a2c00" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M30 45 C22 52 22 62 28 68" fill="none" stroke="#b27113" stroke-width="1.5"/>
                        </svg>
                    </div>

                    <div class="w-full flex justify-end text-4xl font-serif opacity-10">
                        <span class="rotate-90">©</span>
                    </div>
                    
                    <div class="flex-1 flex flex-col items-center justify-center text-center gap-5 z-10 w-full px-2">
                        <h1 class="text-4xl font-black tracking-tighter leading-none italic uppercase">
                            Hoy<br/>
                            <span id="title-galletita" class="text-4xl md:text-5xl block mt-1 tracking-tight text-black">Galletita</span>
                            <span id="title-de-la" class="text-2xl md:text-3xl block font-normal normal-case font-serif tracking-normal mt-0.5 text-gray-700">de la</span>
                            <span id="title-suerte" class="text-5xl md:text-6xl block tracking-tighter uppercase text-black">Suerte</span>
                        </h1>
                        
                        <div id="fecha-container" class="border-2 px-6 py-1 text-sm font-black rounded-full mt-2 border-black text-black">----.--.-- (---)</div>
                        <p id="fortuna-texto" class="text-xl md:text-3xl font-serif italic font-bold leading-tight px-2 mt-3">"Cargando tu destino..."</p>
                        <span class="text-[9px] text-gray-900 tracking-widest uppercase mt-4 opacity-90"> ☕ ¡Me invitas un cafecito!(Mercado Pago) jose.318.canjeo.mp </span>
                    </div>
                    
                    <div class="w-full flex justify-start text-4xl font-serif opacity-10">
                        <span class="text-rotate-90"></span>
                    </div>
                </div>

                <div class="w-full flex flex-col gap-3 px-2">
                    <button id="btn-descargar" class="w-full flex items-center justify-center gap-2 bg-instagreylight text-gray-200 font-semibold py-4 rounded-xl text-sm active:opacity-70 transition-all border border-white/5">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Guardar Fortuna
                    </button>

                    <button id="btn-nueva-suerte" class="w-full font-black py-5 rounded-2xl text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all border-b-4 bg-white text-black border-gray-300">
                        Ver mi Suerte
                    </button>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 w-full bg-instablack border-t border-instagreylight px-10 py-5 flex justify-between items-center text-gray-400 z-50">
                 <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12.97 2.59a1.5 1.5 0 0 0-1.94 0l-7.5 6.22A1.5 1.5 0 0 0 3 9.93v9.57a1.5 1.5 0 0 0 1.5 1.5h15a1.5 1.5 0 0 0 1.5-1.5V9.93a1.5 1.5 0 0 0-.53-1.12l-7.5-6.22ZM19.5 19.5h-15V9.93L12 3.73l7.5 6.2ZM12 16.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"></path></svg>
                 <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                 <a href="https://www.facebook.com/groups/942830941793431" target="_blank" class="w-8 h-8 rounded-full bg-gradient-to-tr from-yellow-400 to-purple-600 p-[1.5px] animate-bounce block">
                    <div class="w-full h-full rounded-full bg-black border-2 border-black overflow-hidden flex items-center justify-center text-[10px] text-white font-bold italic text-center">T</div>
                 </a>
            </div>
        </div>
    </div>

    <script>
        const listaFortunas = [
            "Un viaje inesperado te traerá gran alegría.", "Tu arduo trabajo pronto dará sus frutos. No te rindas.",
            "Hoy es un buen día para conectar con un viejo amigo.", "La paciencia es una virtud que te evitará problemas.",
            "Una nueva oportunidad financiera se aproxima.", "Confía en tu intuición; te guiará por el camino correcto.",
            "Dedica tiempo hoy a cuidar de ti mismo. Te lo mereces.", "Una sonrisa tuya puede cambiar el día de alguien más.",
            "El fracaso es la oportunidad de comenzar de nuevo.", "Aprende a soltar lo que ya no te sirve.",
            "Grandes cosas tienen comienzos pequeños.", "Tu creatividad florecerá en el momento menos pensado.",
            "Alguien está pensando cosas maravillosas de ti ahora.", "La suerte favorece a la mente preparada.",
            "Hoy el universo conspira a tu favor. ¡Aprovéchalo!", "Tu energía positiva atraerá mejores personas a tu vida.",
            "Pronto recibirás una noticia que has estado esperando.", "El éxito no es el destino, es el camino. Disfrútalo.",
            "Una sorpresa romántica está en tu horizonte cercano.", "La abundancia llegará a ti de fuentes inesperadas.",
            "Tu amabilidad será recompensada de forma mágica.", "Hoy encontrarás la respuesta que tanto buscabas.",
            "El dinero fluye hacia ti de manera constante y fácil.", "Mantén la calma, la tormenta está a punto de pasar.",
            "Una puerta se cierra, pero dos más se abren hoy.", "Tu sabiduría interior es más poderosa de lo que crees.",
            "Un encuentro casual se convertirá en algo inolvidable.", "Cree en ti mismo tanto como yo creo en este mensaje.",
            "El amor propio es el inicio de un romance de por vida.", "Lo mejor está por venir. Créelo y lo verás.",
            "Tu mente es un imán; piensa en abundancia y la atraerás.", "Un cambio de perspectiva transformará tu semana.",
            "No cuentes los días, haz que los días cuenten.", "Alguien te observa con profunda admiración y respeto.",
            "El universo removerá lo que te estanca para dejarte avanzar.", "Estás a un pensamiento de distancia de cambiar tu realidad.",
            "Una propuesta inesperada golpeará tu puerta muy pronto.", "Tu salud y energía física experimentarán una notable mejoría.",
            "El miedo es solo una ilusión; del otro lado está tu éxito.", "La respuesta que buscas llegará en forma de un encuentro casual.",
            "Tu intuición nunca se equivoca, escúchala con atención hoy.", "Un dinero olvidado o una deuda vieja volverá a tus manos.",
            "Es momento de tomar ese riesgo que tanto te da vueltas.", "El amor de tu vida está más cerca de lo que imaginas.",
            "Alguien del pasado regresará para cerrar un ciclo pendiente.", "Tu hogar se llenará de una armonía que tanto necesitabas.",
            "Hoy se disuelven los bloqueos que frenaban tus proyectos.", "Un nuevo pasatiempo encenderá una pasión oculta en ti.",
            "La clave de hoy: agradece tres cosas antes de dormir.", "Recibirás un regalo pequeño pero con un significado gigante.",
            "Tu carisma natural abrirá una puerta que creías cerrada.", "El viento sopla a tu favor; es hora de desplegar tus alas.",
            "Un proyecto que dabas por perdido cobrará nueva vida.", "Alguien defenderá tu nombre en un lugar donde no estás.",
            "Tu generosidad volverá a ti multiplicada por diez.", "El destino cruzará tus pasos con alguien muy influyente.",
            "Estás en la lista de prioridades de alguien muy especial.", "Hoy la suerte te sonreirá en los detalles más mínimos.",
            "Un viaje corto te traerá la claridad mental que buscas.", "El universo tiene un plan perfecto para tus finanzas.",
            "Suelta la necesidad de controlarlo todo y disfruta hoy.", "Tu sonrisa será el amuleto de alguien en este día.",
            "Una llamada nocturna cambiará tus planes de la semana.", "Tienes el poder de transformar un problema en oportunidad.",
            "La abundancia no es lo que tienes, sino lo que vibras.", "Se aproxima una temporada de celebraciones familiares.",
            "Tu creatividad resolverá un enigma laboral importante.", "Un mensaje anónimo te dejará pensando de buena manera.",
            "Hoy eres inmune a las malas energías ajenas. Brilla.", "El amor no se busca, se encuentra; mantén los ojos abiertos.",
            "Estás a punto de recibir el reconocimiento que mereces.", "Tu constancia inspirará a una persona de tu entorno.",
            "Una gran idea llegará mientras descansas; anótala.", "La suerte te acompañará en cada decisión que tomes hoy.",
            "Tu pasado te preparó, tu presente te impulsa, tu futuro te espera.", "Un ciclo difícil termina hoy; respira profundo.",
            "La persona en la que piensas también está pensando en ti.", "Un secreto positivo saldrá a la luz para tu beneficio.",
            "No te apresures, las mejores frutas maduran despacio.", "Tu billetera experimentará un alivio muy esperado.",
            "Hoy el destino te pondrá en el lugar correcto a la hora exacta.", "Una nueva amistad cambiará tu forma de ver el mundo.",
            "Tu luz interior es demasiado brillante para pasar desapercibida.", "Un cambio de look o de ambiente renovará tu energía.",
            "La respuesta que necesitas vendrá en tus sueños esta noche.", "Confía en los tiempos del universo; son siempre perfectos.",
            "Alguien te enviará una señal clara de afecto en unas horas.", "Tu palabra tiene poder hoy: decreta lo que deseas.",
            "El éxito financiero llegará a través de una alianza clave.", "Hoy es el día ideal para sanar un viejo rencor.",
            "Un correo electrónico traerá la confirmación que esperas.", "Estás protegido contra cualquier obstáculo en tu camino.",
            "Un animalito traerá un mensaje de paz o alegría a tu día.", "Tu perseverancia es tu mayor virtud; sigue adelante.",
            "Hoy se abren los caminos de la abundancia material.", "Alguien te considera su lugar seguro en el mundo.",
            "Lo que dejas ir deja espacio para algo mucho mejor.", "Una gran racha de buena suerte comienza con este clic.",
            "Eres el arquitecto de tu propio destino; diseña en grande.", "El universo sonríe al ver tu valentía del día de hoy."
        ];

        let fechaActualCadena = "";
        let esDoradaEstado = false;

        // ELEMENTOS DEL DOM
        const cardElement = document.getElementById('card-element');
        const badgeIcon = document.getElementById('badge-icon');
        const badgeTitle = document.getElementById('badge-title');
        const titleGalletita = document.getElementById('title-galletita');
        const titleDeLa = document.getElementById('title-de-la');
        const titleSuerte = document.getElementById('title-suerte');
        const fechaContainer = document.getElementById('fecha-container');
        const fortunaTexto = document.getElementById('fortuna-texto');
        const btnNuevaSuerte = document.getElementById('btn-nueva-suerte');
        const btnDescargar = document.getElementById('btn-descargar');

        const obtenerFecha = () => {
            const hoy = new Date();
            const dias = ["(Dom)", "(Lun)", "(Mar)", "(Mié)", "(Jue)", "(Vie)", "(Sáb)"];
            return `${hoy.getFullYear()}.${String(hoy.getMonth() + 1).padStart(2, '0')}.${String(hoy.getDate()).padStart(2, '0')} ${dias[hoy.getDay()]}`;
        };

        const lanzarConfeti = () => {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#D4AF37', '#F8F6E9', '#AA771C']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#D4AF37', '#F8F6E9', '#AA771C']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };

        const nuevaFortuna = () => {
            const suerte = Math.random() < 0.20;
            const randomFortune = listaFortunas[Math.floor(Math.random() * listaFortunas.length)];
            
            esDoradaEstado = suerte;
            fortunaTexto.innerText = `"${randomFortune}"`;

            if (suerte) {
                // CONFIGURACIÓN TARJETA DORADA
                cardElement.className = "lucky-card w-full aspect-[3/4] rounded-2xl p-8 flex flex-col items-center justify-between text-black relative shadow-2xl overflow-hidden gold-card";
                badgeIcon.className = "w-9 h-9 rounded-full flex items-center justify-center text-sm border bg-gold border-yellow-200 animate-pulse";
                badgeIcon.innerText = "👑";
                badgeTitle.className = "font-bold text-sm text-yellow-400";
                
                titleGalletita.className = "text-4xl md:text-5xl block mt-1 tracking-tight text-yellow-900";
                titleDeLa.className = "text-2xl md:text-3xl block font-normal normal-case font-serif tracking-normal mt-0.5 text-yellow-955";
                titleSuerte.className = "text-5xl md:text-6xl block tracking-tighter uppercase text-yellow-900";
                fechaContainer.className = "border-2 px-6 py-1 text-sm font-black rounded-full mt-2 border-yellow-900 text-yellow-900";
                
                btnNuevaSuerte.className = "w-full font-black py-5 rounded-2xl text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all border-b-4 bg-yellow-500 text-yellow-950 border-yellow-700";
                btnNuevaSuerte.innerText = "✨ Probar otra vez ✨";

                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
                lanzarConfeti();
            } else {
                // CONFIGURACIÓN TARJETA NORMAL
                cardElement.className = "lucky-card w-full aspect-[3/4] rounded-2xl p-8 flex flex-col items-center justify-between text-black relative shadow-2xl overflow-hidden";
                badgeIcon.className = "w-9 h-9 rounded-full flex items-center justify-center text-sm border bg-instagreylight border-white/10";
                badgeIcon.innerText = "🔮";
                badgeTitle.className = "font-bold text-sm text-white";
                
                titleGalletita.className = "text-4xl md:text-5xl block mt-1 tracking-tight text-black";
                titleDeLa.className = "text-2xl md:text-3xl block font-normal normal-case font-serif tracking-normal mt-0.5 text-gray-700";
                titleSuerte.className = "text-5xl md:text-6xl block tracking-tighter uppercase text-black";
                fechaContainer.className = "border-2 px-6 py-1 text-sm font-black rounded-full mt-2 border-black text-black";
                
                btnNuevaSuerte.className = "w-full font-black py-5 rounded-2xl text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all border-b-4 bg-white text-black border-gray-300";
                btnNuevaSuerte.innerText = "Ver mi Suerte";

                if (navigator.vibrate) navigator.vibrate(50);
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const descargarImagen = () => {
            if (cardElement) {
                html2canvas(cardElement, { scale: 2.5, logging: false, useCORS: true }).then(canvas => {
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `Fortuna_${fechaActualCadena.replace(/\s+/g, '_')}.png`;
                    link.click();
                });
            }
        };

        // INICIALIZACIÓN
        fechaActualCadena = obtenerFecha();
        fechaContainer.innerText = fechaActualCadena;
        nuevaFortuna();

        // EVENTOS
        btnNuevaSuerte.addEventListener('click', nuevaFortuna);
        btnDescargar.addEventListener('click', descargarImagen);
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
